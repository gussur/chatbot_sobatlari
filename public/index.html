<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobatLari 50+ Chatbot</title>
    <style>
        /* ==========================================
           1. RESET & BASE STYLES
           ========================================== */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 750px; 
            margin: 40px auto; 
            background-color: #f0fdf4; 
            color: #333; 
        }
        h2 { color: #166534; text-align: center; }
        p.subtitle { 
            text-align: center; 
            color: #4b5563; 
            font-size: 0.9em; 
            margin-bottom: 20px;
        }
        
        /* ==========================================
           2. CHATBOX
           ========================================== */
        #chat-box { 
            height: 450px; 
            border: 2px solid #bbf7d0; 
            border-radius: 10px; 
            padding: 15px; 
            overflow-y: scroll; 
            margin-bottom: 15px; 
            background-color: #ffffff; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        /* ==========================================
           3. BUBBLE CHAT
           ========================================== */
.message {
    margin-bottom: 8px;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.45;
    font-size: 15px;
    max-width: 92%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
}

.user {
    background: #dcfce7;
    margin-left: auto;
    border-bottom-right-radius: 6px;
    color: #14532d;
}

.bot {
    background: #f9fafb;
    margin-right: auto;
    border-bottom-left-radius: 6px;
    color: #1f2937;
}
        
        /* ==========================================
           4. KONTEN DI DALAM BUBBLE 
           ========================================== */
        

.message * {
    margin: 0;
}

.message p + p {
    margin-top: 6px;
}

.message ul,
.message ol {
    margin-top: 6px;
    margin-bottom: 6px;
    padding-left: 20px;
}

.message li + li {
    margin-top: 4px;
} 
        /* ==========================================
           5. TOMBOL COPY
           ========================================== */
        .copy-btn {
            display: block;
            margin-top: 15px;
            padding: 6px 12px;
            font-size: 13px;
            background-color: #d1d5db;
            color: #374151;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn:hover { 
            background-color: #9ca3af; 
            color: white; 
        }
        
        /* ==========================================
           6. UPLOAD & FORM
           ========================================== */
        #upload-btn { 
            background-color: #e5e7eb; 
            color: #374151; 
            padding: 12px; 
            font-size: 18px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
        #upload-btn:hover { 
            background-color: #d1d5db; 
        }
        
        #image-preview { 
            display: none; 
            font-size: 13px; 
            color: #15803d; 
            margin-top: 8px; 
            font-weight: bold; 
            text-align: right; 
        }
        
        #chat-form { 
            display: flex; 
            gap: 10px; 
            align-items: stretch; 
        }
        
        textarea { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px; 
            font-family: inherit; 
            resize: vertical; 
            min-height: 50px; 
            max-height: 150px; 
        }
        
        button[type="submit"] { 
            padding: 12px 20px; 
            background-color: #16a34a; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button[type="submit"]:hover { 
            background-color: #15803d; 
        }

        /* ==========================================
           7. ANIMASI TYPING
           ========================================== */
        .typing-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #15803d;
        }
        .runner-icon {
            font-size: 22px;
            display: inline-block;
            animation: lari-lari 0.5s infinite alternate ease-in-out; 
        }
        @keyframes lari-lari {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-5px) rotate(10deg); }
        }
        .typing-text {
            animation: kedip-kedip 1.5s infinite ease-in-out;
        }
        @keyframes kedip-kedip {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h2>🏃‍♂️ SobatLari 50+</h2>
    <p class="subtitle">Asisten Lari & Kebugaran Khusus Usia Emas</p>
    
    <div id="chat-box">
        <div class="message bot">Halo Master Runners! Saya SobatLari. Ada yang bisa saya bantu untuk jadwal lari atau recovery hari ini? Atau mau bertanya tentang dunia lari? Jangan sungkan! </div>
    </div>
    
    <form id="chat-form">
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <button type="button" id="upload-btn" title="Upload Screenshot Strava">📸</button>
        <textarea id="user-input" placeholder="Tanya soal pace, upload Strava, atau curhat lari..." required></textarea>
        <button type="submit">Kirim</button>
    </form>
    
    <div id="image-preview"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
