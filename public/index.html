<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobatLari 50+ Chatbot</title>
    <style>
        /* Mengatur gaya dasar halaman (warna latar, font) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 750px; margin: 40px auto; background-color: #f0fdf4; color: #333; }
        h2 { color: #166534; text-align: center; }
        p.subtitle { text-align: center; color: #4b5563; font-size: 0.9em; margin-bottom: 20px;}
        
        /* Mengatur kotak tempat percakapan (chatbox) */
        #chat-box { 
            height: 450px; 
            border: 2px solid #bbf7d0; 
            border-radius: 10px; 
            padding: 15px; 
            overflow-y: scroll; 
            margin-bottom: 15px; 
            background-color: #ffffff; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        /* Mengatur gaya gelembung obrolan (bubble chat) */
        .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; line-height: 1.4; white-space: pre-wrap; }
        .user { background-color: #dcfce7; text-align: right; margin-left: 5%; border-bottom-right-radius: 0; color: #166534; }
        .bot { background-color: #f3f4f6; text-align: left; margin-right: 5%; border-bottom-left-radius: 0; color: #1f2937; }
        /* Tombol copy --- */
        .copy-btn {
        display: block;
        margin-top: 15px;
        padding: 6px 12px;
        font-size: 13px;
        background-color: #d1d5db; /* Warna abu-abu tombol */
        color: #374151;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        }
        .copy-btn:hover { background-color: #9ca3af; color: white; }
        /* Tombol Upload */
        #upload-btn { background-color: #e5e7eb; color: #374151; padding: 12px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
        #upload-btn:hover { background-color: #d1d5db; }
        #image-preview { display: none; font-size: 13px; color: #15803d; margin-top: 8px; font-weight: bold; text-align: right; }     
        /* Mengatur kolom ketik dan tombol kirim */
        #chat-form { display: flex; gap: 10px; align-items: stretch; }
        /* Mengganti 'input' menjadi 'textarea' agar bisa banyak baris */
        textarea { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; font-family: inherit; resize: vertical; min-height: 50px; max-height: 150px; }
        button { padding: 12px 20px; background-color: #16a34a; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #15803d; }

        /* Merapatkan jarak paragraf dan pointer  */
        .message h1, .message h2, .message h3, 
        .message h4, .message h5, .message h6 {
            margin-top: 8px;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        /* Jika h2/h3 adalah elemen pertama, buang margin atas */
        .message h2:first-child, .message h3:first-child {
            margin-top: 0;
        }

        /* Batasi efek <br> berlebih */
        .message br {
            display: block;
            content: "";
            margin: 0;
        }
        .message p { 
            margin-top: 0; 
            margin-bottom: 0px; 
        }
        .message li p { 
            margin: 0; 
        }
        .message ul, .message ol { 
            margin-top: 0px;
            margin-bottom: 0px; 
            padding-left: 20px; 
        }
        .message li { 
            margin-bottom: 0px; 
            line-height: 1.4;
        }
        .message p:last-child, .message ul:last-child {
            margin-bottom: 0; 
        }
        /* Animasi biar gak stre menunggu --- */
        .typing-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #15803d;
        }
        .runner-icon {
            font-size: 22px;
            display: inline-block;
            animation: lari-lari 0.5s infinite alternate ease-in-out; 
        }
        @keyframes lari-lari {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-5px) rotate(10deg); }
        }
        .typing-text {
            animation: kedip-kedip 1.5s infinite ease-in-out;
        }
        @keyframes kedip-kedip {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h2>🏃‍♂️ SobatLari 50+</h2>
    <p class="subtitle">Asisten Lari & Kebugaran Khusus Usia Emas</p>
    
    <div id="chat-box">
        <div class="message bot">Halo Master Runners! Saya SobatLari. Ada yang bisa saya bantu untuk jadwal lari atau recovery hari ini? Atau mau bertanya tentang dunia lari? Jangan sungkan! </div>
    </div>
    
    <form id="chat-form">
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        
        <button type="button" id="upload-btn" title="Upload Screenshot Strava">📸</button>
        
        <textarea id="user-input" placeholder="Tanya soal pace, upload Strava, atau curhat lari..." required></textarea>
        <button type="submit">Kirim</button>
    </form>
    
    <div id="image-preview"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
